<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF REGULATOR</title>
  <meta name="description" content="PDF sayfalarını seç, çıkar ve döndür — hızlı ve basit." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <!-- SortableJS script'ini ekle -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>

<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden font-sans">

  <!-- HEADER -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-3 shrink-0">
    <svg class="w-7 h-7 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
    </svg>
    <h1 class="text-lg font-bold tracking-tight">PDF <span class="text-blue-500">REGULATOR</span></h1>
  </header>

  <!-- MAIN: Sol Panel + PDF Viewer -->
  <main class="flex flex-1 overflow-hidden">

    <!-- SOL PANEL: Üretilen PDFler -->
    <aside class="w-64 shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Üretilen PDFler</h2>
      </div>
      <ul id="output-list" class="flex-1 overflow-y-auto p-3 space-y-2" hx-swap-oob="true">
        <li id="output-empty" class="text-xs text-gray-600 italic text-center mt-8">
          Henüz PDF üretilmedi.
        </li>
      </ul>
    </aside>

    <!-- PDF VIEWER -->
    <section class="flex-1 flex flex-col overflow-hidden">

      <!-- Araç çubuğu -->
      <div id="toolbar" class="hidden bg-gray-900 border-b border-gray-800 px-5 py-2 flex items-center gap-3 shrink-0">
        <span id="selection-info" class="text-sm text-gray-400 flex-1">
          Sayfalara tıklayarak seçin.
        </span>

        <div class="flex items-center gap-2">
          <button
            class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded border border-gray-700 transition-colors"
            onclick="selectAllPages()">
            Hepsini Seç
          </button>
          <button
            class="px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded border border-gray-700 transition-colors"
            onclick="clearSelection()">
            Seçimi Temizle
          </button>
          <button id="btn-delete-selected"
            class="hidden px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-red-500 rounded border border-gray-700 transition-colors"
            onclick="deleteSelectedPages()">
            Seçilenleri Sil
          </button>
          <button id="btn-restore-all"
            class="hidden px-3 py-1.5 text-xs bg-gray-800 hover:bg-gray-700 text-yellow-500 rounded border border-gray-700 transition-colors"
            onclick="restoreAllPages()">
            Hepsini Geri Getir
          </button>
        </div>

        <div class="h-6 w-px bg-gray-800 mx-1"></div>

        <button id="btn-extract" class="action-btn bg-blue-600 hover:bg-blue-500 text-white border-blue-500"
          onclick="doExtract()" title="Seçili Sayfaları Çıkar">
          ✂ Çıkar
        </button>
      </div>

      <!-- Sayfa listesi -->
      <div id="viewer" class="flex-1 overflow-y-auto px-6 py-4">
        <div id="upload-hint" class="flex flex-col items-center justify-center h-full gap-4 text-gray-600">
          <svg class="w-20 h-20" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          <p class="text-lg">Aşağıdan bir PDF yükleyin</p>
        </div>
      </div>
    </section>
  </main>

  <!-- UPLOAD ALANI -->
  <footer class="bg-gray-900 border-t border-gray-800 px-6 py-4 shrink-0">
    <div id="drop-zone" class="border-2 border-dashed border-gray-700 rounded-xl p-5 text-center cursor-pointer
             hover:border-blue-500 transition-colors duration-200"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault(); this.classList.add('border-blue-400','bg-blue-950')"
      ondragleave="this.classList.remove('border-blue-400','bg-blue-950')" ondrop="handleDrop(event)">
      <p class="text-sm text-gray-400">
        <span class="text-blue-400 font-semibold">PDF seç</span> veya buraya sürükleyip bırak
      </p>
    </div>
    <form id="upload-form" class="hidden">
      <input id="file-input" type="file" accept=".pdf" class="hidden" onchange="uploadFile(this)" />
    </form>
    <div id="upload-status" class="text-xs text-center mt-2 text-gray-500 hidden"></div>
  </footer>

  <!-- PREVIEW MODAL -->
  <div id="preview-modal" class="modal-overlay" onclick="closePreview()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closePreview()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <img id="preview-img" src="" alt="Önizleme">
    </div>
  </div>

  <script>
    let currentPdfId = null;
    let totalPages = 0;
    let selectedPages = [];
    let deletedPages = new Set();
    let lastClickedPageIdx = null;
    let pageRotations = {};
    let sortableInstance = null;

    function handleDrop(e) {
      e.preventDefault();
      const zone = document.getElementById('drop-zone');
      zone.classList.remove('border-blue-400', 'bg-blue-950');
      const file = e.dataTransfer.files[0];
      if (file) sendFile(file);
    }

    function uploadFile(input) {
      const file = input.files[0];
      if (file) sendFile(file);
    }

    async function sendFile(file) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        showStatus('⚠ Sadece .pdf dosyaları kabul edilir.', 'text-yellow-400');
        return;
      }
      showStatus('⏳ Yükleniyor...', 'text-gray-400');
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        if (!res.ok) {
          const err = await res.json();
          showStatus('✗ Hata: ' + err.detail, 'text-red-400');
          return;
        }
        document.getElementById('viewer').innerHTML = await res.text();
        const inner = document.getElementById('viewer-inner');
        if (inner) {
          // Trigger the HTMX event manually since fetch doesn't
          const evt = new CustomEvent('viewerReady', {
            detail: { pdfId: inner.dataset.pdfId, pageCount: parseInt(inner.dataset.pageCount) }
          });
          document.dispatchEvent(evt);
        }
        showStatus('✓ PDF yüklendi', 'text-green-400');
      } catch (err) {
        showStatus('✗ Bağlantı hatası.', 'text-red-400');
      }
    }

    function showStatus(msg, cls) {
      const el = document.getElementById('upload-status');
      el.textContent = msg;
      el.className = `text-xs text-center mt-2 ${cls}`;
      el.classList.remove('hidden');
    }

    function selectPage(pageIndex, event) {
      if (event.target.closest('.drag-handle')) return;
      if (event.target.closest('.small-rotate-btn')) return;
      if (event.target.closest('.delete-btn-inline')) return; // Ignore selection when deleting
      if (deletedPages.has(parseInt(pageIndex))) return; // Ignore clicks if page is deleted

      pageIndex = parseInt(pageIndex);
      const isShift = event.shiftKey;
      const isMeta = event.ctrlKey || event.metaKey;

      if (!isShift && !isMeta) {
        showPreview(pageIndex);
        selectedPages = [pageIndex];
      } else if (isShift && lastClickedPageIdx !== null) {
        const start = Math.min(lastClickedPageIdx, pageIndex);
        const end = Math.max(lastClickedPageIdx, pageIndex);
        for (let i = start; i <= end; i++) {
          if (!selectedPages.includes(i)) selectedPages.push(i);
        }
      } else if (isMeta) {
        const pos = selectedPages.indexOf(pageIndex);
        if (pos > -1) selectedPages.splice(pos, 1);
        else selectedPages.push(pageIndex);
      }
      lastClickedPageIdx = pageIndex;
      updateHighlight();
      updateSelectionInfo();

      if (event.stopPropagation) event.stopPropagation();
    }

    function selectAllPages() {
      selectedPages = Array.from({ length: totalPages }, (_, i) => i).filter(i => !deletedPages.has(i));
      updateHighlight();
      updateSelectionInfo();
    }

    function clearSelection() {
      selectedPages = [];
      lastClickedPageIdx = null;
      updateHighlight();
      updateSelectionInfo();
    }

    function updateHighlight() {
      document.querySelectorAll('.page-card').forEach(card => {
        const idx = parseInt(card.dataset.pageIndex);
        const shouldBeSelected = selectedPages.includes(idx);
        card.classList.toggle('selected', shouldBeSelected);

        try {
          if (typeof Sortable !== 'undefined' && Sortable.utils && Sortable.utils.select) {
            if (shouldBeSelected) {
              Sortable.utils.select(card);
            } else {
              Sortable.utils.deselect(card);
            }
          }
        } catch (e) {
          console.error("MultiDrag error", e);
        }
      });
    }

    function updateSelectionInfo() {
      const info = document.getElementById('selection-info');
      info.textContent = selectedPages.length === 0 ? 'Sayfaları seçin' : `${selectedPages.length} sayfa seçildi.`;
      
      const btnDeleteSelected = document.getElementById('btn-delete-selected');
      if (btnDeleteSelected) {
        if (selectedPages.length > 0) {
          btnDeleteSelected.classList.remove('hidden');
        } else {
          btnDeleteSelected.classList.add('hidden');
        }
      }

      const btnRestoreAll = document.getElementById('btn-restore-all');
      if (btnRestoreAll) {
        if (deletedPages.size > 0) {
          btnRestoreAll.classList.remove('hidden');
        } else {
          btnRestoreAll.classList.add('hidden');
        }
      }
    }

    function deleteSelectedPages() {
      const pagesToDelete = [...selectedPages];
      pagesToDelete.forEach(idx => {
        deletedPages.add(idx);
        const card = document.getElementById(`page-card-${idx}`);
        if (card) {
          card.classList.add('deleted-page');
          card.classList.remove('selected');
        }
      });
      selectedPages = [];
      updateSelectionInfo();
    }

    function deletePage(event, pageIndex) {
      event.stopPropagation(); // Kartın seçilmesini engelle
      pageIndex = parseInt(pageIndex);
      deletedPages.add(pageIndex);
      
      const card = document.getElementById(`page-card-${pageIndex}`);
      if (card) {
        card.classList.add('deleted-page');
        card.classList.remove('selected');
      }

      const pos = selectedPages.indexOf(pageIndex);
      if (pos > -1) selectedPages.splice(pos, 1);

      updateSelectionInfo();
    }

    function restorePage(event, pageIndex) {
      event.stopPropagation();
      pageIndex = parseInt(pageIndex);
      deletedPages.delete(pageIndex);

      const card = document.getElementById(`page-card-${pageIndex}`);
      if (card) {
        card.classList.remove('deleted-page');
      }

      updateSelectionInfo();
    }

    function restoreAllPages() {
      deletedPages.clear();
      document.querySelectorAll('.page-card').forEach(card => card.classList.remove('deleted-page'));
      updateSelectionInfo();
    }

    function rotateSinglePage(event, pageIndex, direction) {
      event.stopPropagation();
      const angle = direction === 'left' ? -90 : 90;
      let currentRotation = pageRotations[pageIndex] || 0;
      currentRotation = (currentRotation + angle) % 360;
      if (currentRotation < 0) currentRotation += 360;
      pageRotations[pageIndex] = currentRotation;
      const card = document.getElementById(`page-card-${pageIndex}`);
      if (card) {
        const img = card.querySelector('.page-img');
        if (img) img.style.transform = `rotate(${currentRotation}deg)`;
      }
    }

    async function doExtract() {
      if (!currentPdfId || selectedPages.length === 0) return;
      const actRotations = {};
      selectedPages.forEach(idx => { if (pageRotations[idx]) actRotations[idx] = pageRotations[idx]; });
      
      const currentOrder = Array.from(document.querySelectorAll('.page-card'))
        .map(card => parseInt(card.dataset.pageIndex));
      const reorderedSelection = currentOrder.filter(idx => selectedPages.includes(idx) && !deletedPages.has(idx));

      const res = await postAction('/extract', {
        pdf_id: currentPdfId, 
        page_indices: reorderedSelection, 
        rotations: actRotations
      });
      if (res) appendToOutputList(res);
    }

    async function postAction(url, body) {
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) return null;
        showStatus('✓ İşlem tamamlandı.', 'text-green-400');
        return await res.text();
      } catch (e) { return null; }
    }

    function showPreview(pageIndex) {
      const img = document.getElementById(`page-card-${pageIndex}`).querySelector('.page-img');
      const modalImg = document.getElementById('preview-img');
      const modal = document.getElementById('preview-modal');
      modalImg.src = img.src;
      modalImg.style.transform = img.style.transform;
      modal.classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closePreview() {
      document.getElementById('preview-modal').classList.remove('active');
      document.body.classList.remove('modal-open');
    }

    function appendToOutputList(html) {
      const list = document.getElementById('output-list');
      const empty = document.getElementById('output-empty');
      if (empty) empty.remove();
      const wrapper = document.createElement('li');
      wrapper.innerHTML = html;
      list.appendChild(wrapper);
    }

    document.addEventListener('viewerReady', (e) => {
      currentPdfId = e.detail.pdfId;
      totalPages = e.detail.pageCount;
      selectedPages = [];
      deletedPages = new Set();
      lastClickedPageIdx = null;
      pageRotations = {};
      document.getElementById('toolbar').classList.remove('hidden');
      document.getElementById('upload-hint')?.remove();
      updateSelectionInfo();
      const el = document.getElementById('viewer-inner');
      const scrollParent = document.getElementById('viewer');

      if (sortableInstance) sortableInstance.destroy();
      sortableInstance = new Sortable(el, {
        multiDrag: true,
        selectedClass: 'selected',
        animation: 150, 
        handle: '.drag-handle', 
        ghostClass: 'sortable-ghost', 
        dragClass: 'sortable-drag',
        scroll: scrollParent, 
        scrollSensitivity: 80,
        scrollSpeed: 20
      });
    });
  </script>
</body>

</html>

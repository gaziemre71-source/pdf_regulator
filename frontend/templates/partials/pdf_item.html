{#
  Partial: pdf_item.html
  Üretilen her PDF için sol panele eklenen bileşen.
  Jinja2 değişkenleri: file_id, filename, label
#}
<div class="pdf-item">
  <div class="flex items-start gap-2">
    <svg class="w-4 h-4 text-blue-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <div class="flex-1 min-w-0">
      <p class="text-xs font-medium text-gray-200 truncate" title="{{ filename }}">{{ filename }}</p>
      <p class="text-xs text-gray-500 mt-0.5">{{ label }}</p>
    </div>
  </div>
  <a
    href="/download/{{ file_id }}"
    class="download-btn"
    download
  >
    ↓ İndir
  </a>
</div>

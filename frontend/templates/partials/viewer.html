{#
  Partial: viewer.html
  Upload sonrası çağrılır — PDF sayfalarını listeler.
  Jinja2 değişkenleri: pdf_id, page_count, filename
#}
<div
  id="viewer-inner"
  class="space-y-4"
  data-pdf-id="{{ pdf_id }}"
  data-page-count="{{ page_count }}"
>
  <!-- Dosya başlığı -->
  <div class="text-sm text-gray-500 mb-2 flex items-center gap-2">
    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <span class="text-gray-300 font-medium">{{ filename }}</span>
    <span class="text-gray-600">· {{ page_count }} sayfa</span>
  </div>

  <!-- Sayfa kartları -->
  {% for i in range(page_count) %}
  <div
    id="page-card-{{ i }}"
    class="page-card"
    data-page-index="{{ i }}"
    onclick="selectPage('{{ i }}')"
    onmouseenter="hoverPage('{{ i }}')"
    title="Sayfa {{ i + 1 }}"
  >
    <!-- Rotate Overlay Butonları -->
    <div class="rotate-overlay">
      <button class="rotate-btn" onclick="rotateSinglePage(event, '{{ i }}', 'left')" title="Sayfayı Sola Döndür">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg> <!-- Placeholder for Rotate Left Icon (daha basit bir ok) -->
        <span class="sr-only">↺</span>
      </button>
      <button class="rotate-btn" onclick="rotateSinglePage(event, '{{ i }}', 'right')" title="Sayfayı Sağa Döndür">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg> <!-- Placeholder for Rotate Right Icon -->
        <span class="sr-only">↻</span>
      </button>
    </div>

    <div class="page-number">{{ i + 1 }}</div>
    <img
      src="/page/{{ pdf_id }}/{{ i }}"
      alt="Sayfa {{ i + 1 }}"
      class="page-img"
      loading="lazy"
    />
  </div>
  {% endfor %}
</div>
